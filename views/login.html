<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Attendance Tracking System</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Custom Styles -->
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 40px;
      padding-bottom: 40px;
    }
  </style>
</head>
<body>

  <div class="login-card glass-panel shadow-sm">
    <!-- Header -->
    <div class="text-center mb-4">
      <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-gradient rounded text-white p-3 mb-3 shadow-sm">
        <i class="bi bi-shield-lock-fill fs-3"></i>
      </div>
      <h2 class="headline-text mb-1 fw-bold text-primary">Attendance Tracking</h2>
      <p class="text-secondary small">Corporate Punch Tracking & Analytics Portal</p>
    </div>

    <!-- Error Alert -->
    <div id="error-alert" class="alert alert-glass py-2 px-3 mb-3 d-none">
      <i class="bi bi-exclamation-octagon-fill me-2"></i> <span id="error-message"></span>
    </div>

    <!-- Microsoft MSAL Integration -->
    <div class="mb-4">
      <div class="d-flex align-items-center mb-3">
        <hr class="flex-grow-1 border-secondary opacity-25">
        <span class="mx-3 text-secondary text-uppercase small font-monospace" style="font-size: 0.7rem;">Corporate Access</span>
        <hr class="flex-grow-1 border-secondary opacity-25">
      </div>
      
      <!-- Mock MSAL Role Selector -->
      <div class="mb-3">
        <label class="form-label text-secondary small">Simulate MSAL SSO Role:</label>
        <select id="msal-role" class="form-select custom-input">
          <option value="User">Standard User (MSAL)</option>
          <option value="Admin">Administrator (MSAL)</option>
        </select>
      </div>

      <button id="msal-login-btn" type="button" class="btn msal-btn w-100 py-2 d-flex align-items-center justify-content-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 23 23" class="me-1">
          <path fill="#f35325" d="M0 0h11v11H0z"/>
          <path fill="#81bc06" d="M12 0h11v11H12z"/>
          <path fill="#05a6f0" d="M0 12h11v11H0z"/>
          <path fill="#ffba08" d="M12 12h11v11H12z"/>
        </svg>
        Sign in with Microsoft
      </button>
    </div>

    <!-- Fallback Classic credentials form -->
    <form id="local-login-form">
      <div class="d-flex align-items-center mb-4">
        <hr class="flex-grow-1 border-secondary opacity-25">
        <span class="mx-3 text-secondary text-uppercase small font-monospace" style="font-size: 0.7rem;">Credential Login</span>
        <hr class="flex-grow-1 border-secondary opacity-25">
      </div>

      <!-- Username -->
      <div class="mb-3">
        <label for="username" class="form-label text-secondary small">ADID / Username</label>
        <div class="input-group">
          <span class="input-group-text bg-light text-secondary"><i class="bi bi-person"></i></span>
          <input type="text" id="username" class="form-control custom-input" placeholder="e.g. admin or user" required autocomplete="username">
        </div>
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label for="password" class="form-label text-secondary small">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-light text-secondary"><i class="bi bi-key"></i></span>
          <input type="password" id="password" class="form-control custom-input" placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn-primary bg-gradient w-100 py-2 fw-medium shadow-sm">
        <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
      </button>
    </form>
  </div>

  <script>
    // Traditional credentials form submission
    document.getElementById('local-login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errAlert = document.getElementById('error-alert');
      errAlert.classList.add('d-none');

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          window.location.href = '/dashboard';
        } else {
          showError(data.error || 'Invalid credentials.');
        }
      } catch (error) {
        showError('Network connectivity error.');
      }
    });

    // Microsoft Simulated MSAL Trigger
    document.getElementById('msal-login-btn').addEventListener('click', async () => {
      const errAlert = document.getElementById('error-alert');
      errAlert.classList.add('d-none');
      const role = document.getElementById('msal-role').value;

      try {
        const response = await fetch('/api/auth/msal', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ role })
        });
        const data = await response.json();
        
        if (response.ok && data.success) {
          window.location.href = '/dashboard';
        } else {
          showError('SSO simulated authentication failure.');
        }
      } catch (error) {
        showError('SSO simulated network error.');
      }
    });

    function showError(msg) {
      const errAlert = document.getElementById('error-alert');
      const errMsg = document.getElementById('error-message');
      errMsg.textContent = msg;
      errAlert.classList.remove('d-none');
    }
  </script>
</body>
</html>
